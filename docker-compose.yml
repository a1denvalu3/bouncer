version: '3.8'

services:
  bouncer:
    build: .
    container_name: bouncer
    privileged: true
    environment:
      # Required tokens
      - GITHUB_TOKEN=${GITHUB_PAT}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENCODE_MODEL=openrouter/google/gemini-3.1-pro-preview
      # Database encryption key (Required)
      - DB_PASSPHRASE=${DB_PASSPHRASE}
      # Time window for pulling PRs
      - PR_MAX_AGE=${PR_MAX_AGE:-4 months}
      - SLEEP_DURATION=${SLEEP_DURATION:-60}
      - REVIEW_TIMEOUT=${REVIEW_TIMEOUT:-30m}
      - SKIP_PRS=${SKIP_PRS:-}
      - ALLOWED_AUTHOR_ASSOCIATIONS=${ALLOWED_AUTHOR_ASSOCIATIONS:-COLLABORATOR,CONTRIBUTOR,MEMBER,OWNER}
      # Repository to open PRs to with findings
      - REPORT_REPO=${REPORT_REPO:-myorg/security-audits}
      # E.g., "octocat/Hello-World"
      - REPOS=${REPOS:-myorg/repo1,myorg/repo2}
    volumes:
      # Maps the local ./out folder to /out inside the container for permanent storage
      - ./out:/out
    restart: unless-stopped
